quarkus.application.name=azzo-assistant-api
quarkus.http.port=8081

# ─── Banco de dados (mesmo PostgreSQL do backend principal) ───────────────────
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=${DB_USERNAME:postgres}
%dev.quarkus.datasource.password=${DB_PASSWORD:postgres}
%dev.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/azzo?currentSchema=assistant_app}

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=assistant_app
quarkus.flyway.default-schema=assistant_app
quarkus.flyway.locations=classpath:db/migration

# ─── REST Client → Backend Principal ─────────────────────────────────────────
quarkus.rest-client.agenda-pro.url=${AGENDA_PRO_API_URL:http://localhost:8080}
quarkus.rest-client.agenda-pro.connect-timeout=5000
quarkus.rest-client.agenda-pro.read-timeout=10000

# ─── Autenticação interna ─────────────────────────────────────────────────────
app.internal.api-key=${INTERNAL_API_KEY:changeme-dev}

# ─── CORS ─────────────────────────────────────────────────────────────────────
quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:8080,http://localhost:5173
%prod.quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:8080}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-tenant-id,x-internal-api-key,x-user-identifier,x-user-name

# ─── JWT (leitura opcional) ───────────────────────────────────────────────────
mp.jwt.verify.issuer=azzo-agenda-pro
%dev.mp.jwt.verify.publickey.location=file:./publicKey.pem

# ─── Assistant ────────────────────────────────────────────────────────────────
assistant.conversation.ttl-minutes=${ASSISTANT_CONVERSATION_TTL_MINUTES:120}
assistant.ai.training-dir=${ASSISTANT_AI_TRAINING_DIR:src/main/resources/ai/training}
assistant.ai.models-dir=${ASSISTANT_AI_MODELS_DIR:src/main/resources/ai/models}
assistant.greeting-zone=${ASSISTANT_GREETING_ZONE:America/Sao_Paulo}
assistant.intent.min-confidence=${ASSISTANT_INTENT_MIN_CONFIDENCE:0.62}

# ─── Ollama LLM ───────────────────────────────────────────────────────────────
# Desativado por padrão. Ativar com OLLAMA_ENABLED=true
assistant.ollama.enabled=${OLLAMA_ENABLED:false}
assistant.ollama.model=${OLLAMA_MODEL:gemma2:2b}
assistant.ollama.min-confidence=${OLLAMA_MIN_CONFIDENCE:0.75}

# URL do container Ollama (docker-compose: http://ollama-llm:11434, local: http://localhost:11434)
quarkus.rest-client.ollama.url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.rest-client.ollama.connect-timeout=3000
# Timeout de leitura: gemma2:2b em CPU pode levar até 60s na primeira chamada
quarkus.rest-client.ollama.read-timeout=6000

# Ativa Ollama automaticamente em dev local
%dev.assistant.ollama.enabled=true

# ─── Rotas públicas ───────────────────────────────────────────────────────────
quarkus.http.auth.permission.public.paths=/api/v1/assistant/message,/api/v1/assistant/admin/retrain,/q/*
quarkus.http.auth.permission.public.policy=permit
# Swagger / OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger-ui
# ─── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.console.enable=true
%dev.quarkus.log.level=INFO
%prod.quarkus.log.level=INFO
%prod.quarkus.log.console.json=true
